<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | MAIRAÉ</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body class="bg-beige-100 flex flex-col min-h-screen">
  <div id="navbar-container"></div>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    <div class="max-w-3xl mx-auto bg-white rounded-2xl shadow-sm border border-beige-200 p-8">
      <h1 class="text-3xl font-bold text-primary-dark mb-8 text-center">Secure Checkout</h1>
      
      <form id="checkout-form" class="space-y-6">
        <div>
          <h2 class="text-xl font-bold text-gray-900 border-b border-gray-200 pb-2 mb-4">Shipping Information</h2>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label for="fullName" class="block text-sm font-medium text-gray-700">Full Name</label>
              <input type="text" id="fullName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-green focus:ring-primary-green px-4 py-2 border" required>
            </div>
            <div>
              <label for="address" class="block text-sm font-medium text-gray-700">Address</label>
              <input type="text" id="address" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-green focus:ring-primary-green px-4 py-2 border" required>
            </div>
            <div>
              <label for="city" class="block text-sm font-medium text-gray-700">City</label>
              <input type="text" id="city" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-green focus:ring-primary-green px-4 py-2 border" required>
            </div>
            <div>
              <label for="zip" class="block text-sm font-medium text-gray-700">ZIP Code</label>
              <input type="text" id="zip" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-green focus:ring-primary-green px-4 py-2 border" required>
            </div>
          </div>
        </div>

        <div>
          <h2 class="text-xl font-bold text-gray-900 border-b border-gray-200 pb-2 mb-4 mt-8">Payment Details</h2>
          <div class="bg-gray-50 p-4 rounded-lg flex items-center mb-4 border border-gray-200">
            <svg class="h-6 w-6 text-gray-600 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
            </svg>
            <span class="text-sm text-gray-600">Secure Payment Processing (Demo)</span>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-1 md:col-span-2">
              <label for="cardName" class="block text-sm font-medium text-gray-700">Name on Card</label>
              <input type="text" id="cardName" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-green focus:ring-primary-green px-4 py-2 border" required>
            </div>
            <div class="col-span-1 md:col-span-2">
              <label for="cardNumber" class="block text-sm font-medium text-gray-700">Card Number</label>
              <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-green focus:ring-primary-green px-4 py-2 border" required>
            </div>
            <div>
              <label for="expiry" class="block text-sm font-medium text-gray-700">Expiry (MM/YY)</label>
              <input type="text" id="expiry" placeholder="MM/YY" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-green focus:ring-primary-green px-4 py-2 border" required>
            </div>
            <div>
              <label for="cvc" class="block text-sm font-medium text-gray-700">CVC</label>
              <input type="text" id="cvc" placeholder="123" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-primary-green focus:ring-primary-green px-4 py-2 border" required>
            </div>
          </div>
        </div>

        <button type="submit" id="submit-btn" class="w-full btn-primary py-4 text-xl font-bold mt-8 flex justify-center items-center shadow-md">
          Place Order
        </button>
      </form>
    </div>
  </main>

  <div id="footer-container"></div>

  <script type="module" src="../js/main.js"></script>
  <script type="module">
    import { cart } from '../js/cart.js';
    import { auth } from '../js/auth.js';

    document.addEventListener('DOMContentLoaded', () => {
      if (!auth.isAuthenticated()) {
        window.location.href = '/pages/login.html';
        return;
      }
      
      const form = document.getElementById('checkout-form');
      
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('submit-btn');
        btn.innerHTML = '<div class="inline-block animate-spin rounded-full border-2 border-solid border-white border-r-transparent h-5 w-5 mr-2"></div> Processing...';
        btn.disabled = true;

        const result = await cart.checkout();
        
        if (result.success) {
          alert('Order placed successfully! Order ID: ' + result.order.id);
          window.location.href = '/pages/shop.html';
        } else {
          alert(result.message);
          btn.innerHTML = 'Place Order';
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
