<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | MAIRAÉ</title>
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body class="bg-beige-100 flex flex-col min-h-screen">
  <div id="navbar-container"></div>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
    <h1 class="text-3xl font-bold text-primary-dark mb-8 text-center md:text-left">Your Shopping Cart</h1>
    
    <div class="flex flex-col lg:flex-row gap-8">
      <!-- Cart Items List -->
      <div class="lg:w-2/3 bg-white rounded-2xl shadow-sm border border-beige-200 p-6">
        <div id="cart-container">
          <div class="text-center py-10 text-gray-500">Loading cart...</div>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="lg:w-1/3">
        <div class="bg-white rounded-2xl shadow-sm border border-beige-200 p-6 sticky top-24">
          <h2 class="text-xl font-bold text-primary-dark mb-6">Order Summary</h2>
          <div class="flex justify-between mb-4 text-gray-600">
            <span>Subtotal</span>
            <span id="subtotal" class="font-medium">...</span>
          </div>
          <div class="flex justify-between mb-4 text-gray-600 pb-4 border-b border-gray-200">
            <span>Estimated Shipping</span>
            <span>Free</span>
          </div>
          <div class="flex justify-between mb-8 text-xl font-bold text-primary-dark">
            <span>Total</span>
            <span id="total">...</span>
          </div>
          <button id="checkout-btn" class="w-full btn-primary py-3.5 text-lg font-medium shadow-md disabled:bg-gray-400 disabled:cursor-not-allowed">
            Proceed to Checkout
          </button>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-container"></div>

  <script type="module" src="../js/main.js"></script>
  <script type="module">
    import { cart } from '../js/cart.js';
    import { auth } from '../js/auth.js';

    // Global references for inline handlers
    window.updateCartQty = async (id, newQty) => {
      if (newQty < 1) newQty = 1;
      await cart.updateQuantity(id, newQty);
      loadCart();
    };
    
    window.removeCartItem = async (id) => {
      if (confirm('Remove item from cart?')) {
        await cart.removeItem(id);
        loadCart();
      }
    };

    const container = document.getElementById('cart-container');
    const subtotalEl = document.getElementById('subtotal');
    const totalEl = document.getElementById('total');
    const checkoutBtn = document.getElementById('checkout-btn');

    async function loadCart() {
      if (!auth.isAuthenticated()) {
        container.innerHTML = '<div class="text-center py-10"><p class="text-gray-500 mb-4">You need to login to view your cart.</p><a href="/pages/login.html" class="btn-primary inline-block">Login Now</a></div>';
        checkoutBtn.disabled = true;
        subtotalEl.textContent = '$0.00';
        totalEl.textContent = '$0.00';
        return;
      }

      const items = await cart.getCart();
      
      if (!items || items.length === 0) {
        container.innerHTML = '<div class="text-center py-16"><p class="text-gray-500 mb-6 text-lg">Your cart is currently empty.</p><a href="/pages/shop.html" class="btn-primary inline-block">Continue Shopping</a></div>';
        checkoutBtn.disabled = true;
        subtotalEl.textContent = '$0.00';
        totalEl.textContent = '$0.00';
        return;
      }

      checkoutBtn.disabled = false;
      let totalAmount = 0;
      
      let html = '<ul class="divide-y divide-beige-200">';
      
      items.forEach(item => {
        const product = item.Product;
        const itemTotal = product.price * item.quantity;
        totalAmount += itemTotal;
        
        html += `
          <li class="py-6 flex flex-col sm:flex-row items-center sm:items-start gap-6">
            <a href="/pages/product.html?id=${product.id}" class="h-24 w-24 flex-shrink-0 overflow-hidden rounded-md border border-gray-200 bg-beige-100 block">
              <img src="${product.image || 'https://via.placeholder.com/150'}" alt="${product.name}" class="h-full w-full object-cover object-center">
            </a>
            <div class="flex flex-1 flex-col w-full">
              <div>
                <div class="flex justify-between text-base font-medium text-gray-900 mb-1 leading-tight text-center sm:text-left">
                  <h3><a href="/pages/product.html?id=${product.id}" class="hover:text-primary-green transition-colors">${product.name}</a></h3>
                  <p class="ml-4">$${Number(product.price).toFixed(2)}</p>
                </div>
                <p class="mt-1 text-sm text-gray-500 text-center sm:text-left">${product.category}</p>
              </div>
              <div class="flex flex-1 items-end justify-between mt-4 sm:mt-0 text-sm">
                <div class="flex items-center border border-gray-300 rounded overflow-hidden">
                  <button onclick="updateCartQty(${item.id}, ${item.quantity - 1})" class="px-3 py-1 bg-gray-50 hover:bg-gray-200 text-gray-600 transition-colors">-</button>
                  <span class="w-10 text-center py-1 font-medium bg-white">${item.quantity}</span>
                  <button onclick="updateCartQty(${item.id}, ${item.quantity + 1})" class="px-3 py-1 bg-gray-50 hover:bg-gray-200 text-gray-600 transition-colors">+</button>
                </div>
                <div class="flex">
                  <button type="button" onclick="removeCartItem(${item.id})" class="text-red-500 hover:text-red-700 font-medium transition-colors">
                    Remove
                  </button>
                </div>
              </div>
            </div>
          </li>
        `;
      });
      
      html += '</ul>';
      container.innerHTML = html;
      
      subtotalEl.textContent = `$${totalAmount.toFixed(2)}`;
      totalEl.textContent = `$${totalAmount.toFixed(2)}`;
    }

    // Initialize
    loadCart();

    // Checkout handler
    checkoutBtn.addEventListener('click', () => {
      window.location.href = '/pages/checkout.html';
    });
  </script>
</body>
</html>
